apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ultraportal
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/PauloK3tchup/ultraportal-gitops.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: ultraportal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
